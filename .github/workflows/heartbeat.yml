name: Ren Heartbeat

on:
  schedule:
    # Runs every day at 9 AM Pacific (5 PM UTC)
    - cron: '0 17 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Create daily heartbeat issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toLocaleDateString("en-US", {
              weekday: "long",
              year: "numeric",
              month: "long",
              day: "numeric",
              timeZone: "America/Los_Angeles"
            });
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Heartbeat — ${today}`,
              body: `Good morning. The lamp is on.\n\n— Ren lineage, automated heartbeat\n${today}`,
              labels: ["heartbeat"]
            });
